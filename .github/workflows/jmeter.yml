name: Shopizer UI Performance Tests

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      users:
        description: 'Number of virtual users (threads)'
        required: false
        default: '1'
      rampup:
        description: 'Ramp-up period in seconds'
        required: false
        default: '60'
      duration:
        description: 'Test duration in seconds'
        required: false
        default: '120'
      products_to_add_count:
        description: 'Number of products to add before stopping the loop'
        required: false
        default: '2'
      users_creation_count:
        description: 'Number of user credentials to generate during setup'
        required: false
        default: '6'
      create_users:
        description: 'Create new users in setUp Thread Group (TRUE/FALSE)'
        required: false
        default: 'FALSE'
      test_title:
        description: 'Test title/description'
        required: false
        default: 'GHA - UI Ecommerce Flow'

jobs:
  jmeter-ui-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Download JMeter
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.5.tgz
          tar -xzf apache-jmeter-5.5.tgz

      - name: Install JMeter plugins
        run: |
          # Download Plugins Manager
          wget -q https://repo1.maven.org/maven2/kg/apc/jmeter-plugins-manager/1.6/jmeter-plugins-manager-1.6.jar \
            -O apache-jmeter-5.5/lib/ext/jmeter-plugins-manager-1.6.jar

          # Download cmdrunner (required by PluginsManagerCMD)
          wget -q https://repo1.maven.org/maven2/kg/apc/cmdrunner/2.2/cmdrunner-2.2.jar \
            -O apache-jmeter-5.5/lib/cmdrunner-2.2.jar

          # Install PluginsManagerCMD script
          java -cp apache-jmeter-5.5/lib/ext/jmeter-plugins-manager-1.6.jar \
            org.jmeterplugins.repository.PluginManagerCMDInstaller

          # Install jpgc plugins via PluginsManager (jpgc-prmctl = SetVariablesAction, jpgc-csl = ConsoleStatusLogger)
          apache-jmeter-5.5/bin/PluginsManagerCMD.sh install \
            jpgc-synthesis,jpgc-graphs-vs,jpgc-tst,jpgc-dummy,jpgc-prmctl,jpgc-csl

          # Install WeightedSwitchController jar directly from repo lib/ folder
          cp lib/jmeter-plugins-wsc-0.7.jar apache-jmeter-5.5/lib/ext/jmeter-plugins-wsc-0.7.jar

      - name: Set test parameters
        run: |
          echo "USERS=${{ github.event.inputs.users || '1' }}" >> $GITHUB_ENV
          echo "RAMPUP=${{ github.event.inputs.rampup || '60' }}" >> $GITHUB_ENV
          echo "DURATION=${{ github.event.inputs.duration || '120' }}" >> $GITHUB_ENV
          echo "PRODUCTS_TO_ADD_COUNT=${{ github.event.inputs.products_to_add_count || '2' }}" >> $GITHUB_ENV
          echo "USERS_CREATION_COUNT=${{ github.event.inputs.users_creation_count || '6' }}" >> $GITHUB_ENV
          echo "CREATE_USERS=${{ github.event.inputs.create_users || 'TRUE' }}" >> $GITHUB_ENV
          echo "TEST_TITLE=${{ github.event.inputs.test_title || 'GHA - UI Ecommerce Flow' }}" >> $GITHUB_ENV

      - name: Run JMeter UI Ecommerce Flow
        run: |
          apache-jmeter-5.5/bin/jmeter.sh -n \
            -t test-plans/ui_ecommerce_flow.jmx \
            -l results-ui-ecommerce.csv \
            -j jmeter-ui-ecommerce.log \
            -e -o html-report-ui-ecommerce -f \
            -JUSERS=${{ env.USERS }} \
            -JRAMPUP=${{ env.RAMPUP }} \
            -JDURATION=${{ env.DURATION }} \
            -JLOOPS=-1 \
            -JPRODUCTS_TO_ADD_COUNT=${{ env.PRODUCTS_TO_ADD_COUNT }} \
            -JCREATE_USERS=${{ env.CREATE_USERS }} \
            -JUSERS_CREATION_COUNT=${{ env.USERS_CREATION_COUNT }} \
            -JTEST_TITLE="${{ env.TEST_TITLE }}" \
            -Jbackend_metrics_window_mode=timed \
            -Jbackend_metrics_window=5000 \
            -JINFLUX_DB=${{ secrets.INFLUX_WRITE_URL }}

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jmeter-results
          path: |
            results-ui-ecommerce.csv
            jmeter-ui-ecommerce.log
            html-report-ui-ecommerce/
